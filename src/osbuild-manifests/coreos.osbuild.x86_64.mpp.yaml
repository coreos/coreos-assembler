version: '2'
mpp-vars:
  artifact_name_prefix: $artifact_name_prefix
  ociarchive: $ociarchive
  osname: $osname
  container_imgref: $container_imgref
  container_repo: $container_repo
  container_tag: $container_tag
  extra_kargs: $extra_kargs
  metal_image_size_mb: $metal_image_size_mb
  cloud_image_size_mb: $cloud_image_size_mb
  bios_boot_size_mb: 1
  ppc_prep_size_mb: 4
  reserved_part_size_mb: 1
  efi_system_size_mb: 127
  boot_size_mb: 384
  sector_size: 512
  four_k_sector_size: 4096
  # Filesystem UUID and label definitions. These UUIDs
  # are looked for on boot and if found replaced with
  # a new random UUID to make each install unique.
  boot_fs_uuid: 96d15588-3596-4b3c-adca-a2ff7279ea63
  boot_fs_label: boot
  root_fs_uuid: 910678ff-f77e-4a7d-8d53-86f2ac47a823
  root_fs_label: root
  # The agcount of the XFS root filesystem. Set this to a smaller value
  # than the default (4) so we grown filesystems (most of our user
  # base) will have a lower overall agcount for their grown filesystem.
  # See https://github.com/coreos/fedora-coreos-tracker/issues/1993
  root_fs_agcount: 2
  # For some stages (i.e. the qemu stages) we'll use the host as
  # the buildroot (i.e. COSA in most cases but sometimes just
  # the actual HOST filesystem like in coreos/custom-coreos-disk-images).
  # This is useful/necessary because we definitely don't include
  # qemu-img or tools like zip in the actual CoreOS OS. "" here
  # means to use the host as buildroot. It is worth noting that
  # the host buildroot is the default if nothing is specified.
  # We're still defining it here in an attempt to be explicit.
  host_as_buildroot: ""
  # Set the buildroot string to use for most operations here. We create
  # the buildroot from the target OSTree contents so we have version
  # matches. Unfortunately for FCOS there is no python so we can't
  # really use FCOS as the buildroot so we'll use the host as the
  # buildroot there.
  buildroot:
    mpp-if: osname in ['rhcos', 'scos']
    then: "name:deployed-tree"
    else:
      mpp-format-string: '{host_as_buildroot}'
mpp-define-images:
  - id: image
    sector_size:
        mpp-format-int: "{sector_size}"
    size:
      mpp-format-string: "{metal_image_size_mb * 1024 * 1024}"
    table:
      uuid: 00000000-0000-4000-a000-000000000001
      label: gpt
      partitions:
        - name: BIOS-BOOT
          type: 21686148-6449-6E6F-744E-656564454649
          bootable: true
          size:
            mpp-format-int: "{bios_boot_size_mb * 1024 * 1024 / sector_size}"
        - name: EFI-SYSTEM
          type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
          size:
            mpp-format-int: "{efi_system_size_mb * 1024 * 1024 / sector_size}"
        - name: boot
          type: BC13C2FF-59E6-4262-A352-B275FD6F7172
          size:
            mpp-format-int: "{boot_size_mb * 1024 * 1024 / sector_size}"
        - name: root
          type: 4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709
  - id: image4k
    sector_size:
        mpp-format-int: "{four_k_sector_size}"
    size:
      mpp-format-string: "{metal_image_size_mb * 1024 * 1024}"
    table:
      uuid: 00000000-0000-4000-a000-000000000001
      label: gpt
      partitions:
        - name: BIOS-BOOT
          type: 21686148-6449-6E6F-744E-656564454649
          bootable: true
          size:
            mpp-format-int: "{bios_boot_size_mb * 1024 * 1024 / four_k_sector_size}"
        - name: EFI-SYSTEM
          type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
          size:
            mpp-format-int: "{efi_system_size_mb * 1024 * 1024 / four_k_sector_size}"
        - name: boot
          type: BC13C2FF-59E6-4262-A352-B275FD6F7172
          size:
            mpp-format-int: "{boot_size_mb * 1024 * 1024 / four_k_sector_size}"
        - name: root
          type: 4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709
pipelines:
  - mpp-import-pipelines:
      path: build.common.ipp.yaml
  - name: raw-image
    build:
      mpp-format-string: '{buildroot}'
    stages:
      - type: org.osbuild.truncate
        options:
          filename: disk.img
          size:
            mpp-format-string: '{image.size}'
      - type: org.osbuild.sfdisk
        devices:
          device:
            type: org.osbuild.loopback
            options:
              filename: disk.img
        options:
          mpp-format-json: '{image.layout}'
      # Create EFI filesystem on EFI architectures
      - mpp-if: arch in ['x86_64', 'aarch64', 'riscv64']
        then:
          type: org.osbuild.mkfs.fat
          devices:
            device:
              type: org.osbuild.loopback
              options:
                filename: disk.img
                start:
                  mpp-format-int: '{image.layout[''EFI-SYSTEM''].start}'
                size:
                  mpp-format-int: '{image.layout[''EFI-SYSTEM''].size}'
                lock: true
          options:
            label: EFI-SYSTEM
            volid: 7B7795E7
      - type: org.osbuild.mkfs.ext4
        devices:
          device:
            type: org.osbuild.loopback
            options:
              filename: disk.img
              start:
                mpp-format-int: '{image.layout[''boot''].start}'
              size:
                mpp-format-int: '{image.layout[''boot''].size}'
              lock: true
        options:
          uuid:
            mpp-format-string: '{boot_fs_uuid}'
          label:
            mpp-format-string: '{boot_fs_label}'
          # Set manually the metadata_csum_seed ext4 option otherwise changing the
          # filesystem UUID while it's mounted doesn't work. Can remove this when
          # metadata_csum_seed is default in RHEL, which can be checked by looking
          # in /etc/mke2fs.conf.
          metadata_csum_seed: true
      - type: org.osbuild.mkfs.xfs
        devices:
          device:
            type: org.osbuild.loopback
            options:
              filename: disk.img
              start:
                mpp-format-int: '{image.layout[''root''].start}'
              size:
                mpp-format-int: '{image.layout[''root''].size}'
              lock: true
        options:
          agcount:
            mpp-format-int: '{root_fs_agcount}'
          uuid:
            mpp-format-string: '{root_fs_uuid}'
          label:
            mpp-format-string: '{root_fs_label}'
      # We've created the filesystems. Now let's create the mountpoints (directories)
      # on the filesystems and label them with appropriate SELinux labels. This also
      # covers things like filesystem autogenerated files like 'lost+found'. The labeling
      # will happen once with just the root filesystem mounted and once with the boot
      # filesystem mounted too (to make sure we get all potentially hidden mountpoints).
      # https://github.com/coreos/fedora-coreos-tracker/issues/1771
      - type: org.osbuild.mkdir
        options:
          paths:
            - path: mount://root/boot
              mode: 493
            # Create /boot/efi mountpoint on EFI architectures
            - mpp-if: arch in ['x86_64', 'aarch64', 'riscv64']
              then:
                path: mount://boot/efi
                mode: 493
        devices:
          disk:
            type: org.osbuild.loopback
            options:
              filename: disk.img
              partscan: true
        mounts:
          - name: root
            type: org.osbuild.xfs
            source: disk
            partition:
              mpp-format-int: '{image.layout[''root''].partnum}'
            target: /root-mount-point
          # Mount boot partition on EFI architectures for /boot/efi creation
          - mpp-if: arch in ['x86_64', 'aarch64', 'riscv64']
            then:
              name: boot
              type: org.osbuild.ext4
              source: disk
              partition:
                mpp-format-int: '{image.layout[''boot''].partnum}'
              target: /boot-mount-point
      - type: org.osbuild.selinux
        options:
          file_contexts: input://tree/etc/selinux/targeted/contexts/files/file_contexts
          target: mount://root/
        inputs:
          tree:
            type: org.osbuild.tree
            origin: org.osbuild.pipeline
            references:
              - name:deployed-tree
        devices:
          disk:
            type: org.osbuild.loopback
            options:
              filename: disk.img
              partscan: true
        mounts:
          - name: root
            type: org.osbuild.xfs
            source: disk
            partition:
              mpp-format-int: '{image.layout[''root''].partnum}'
            target: /
      - type: org.osbuild.selinux
        options:
          file_contexts: input://tree/etc/selinux/targeted/contexts/files/file_contexts
          target: mount://root/boot/
        inputs:
          tree:
            type: org.osbuild.tree
            origin: org.osbuild.pipeline
            references:
              - name:deployed-tree
        devices:
          disk:
            type: org.osbuild.loopback
            options:
              filename: disk.img
              partscan: true
        mounts:
          - name: root
            type: org.osbuild.xfs
            source: disk
            partition:
              mpp-format-int: '{image.layout[''root''].partnum}'
            target: /
          - name: boot
            type: org.osbuild.ext4
            source: disk
            partition:
              mpp-format-int: '{image.layout[''boot''].partnum}'
            target: /boot
      - type: org.osbuild.copy
        inputs:
          tree:
            type: org.osbuild.tree
            origin: org.osbuild.pipeline
            references:
              - name:tree
        options:
          paths:
            - from: input://tree/
              to: mount://root/
        devices:
          disk:
            type: org.osbuild.loopback
            options:
              filename: disk.img
              partscan: true
        mounts:
          - name: root
            type: org.osbuild.xfs
            source: disk
            partition:
              mpp-format-int: '{image.layout[''root''].partnum}'
            target: /
          - name: boot
            type: org.osbuild.ext4
            source: disk
            partition:
              mpp-format-int: '{image.layout[''boot''].partnum}'
            target: /boot
          # Mount EFI partition on EFI architectures
          - mpp-if: arch in ['x86_64', 'aarch64', 'riscv64']
            then:
              name: efi
              type: org.osbuild.fat
              source: disk
              partition:
                mpp-format-int: '{image.layout[''EFI-SYSTEM''].partnum}'
              target: /boot/efi
      # Install bootloader (not on s390x which uses zipl)
      - mpp-if: arch != 's390x'
        then:
          type: org.osbuild.bootupd
          options:
            # Install BIOS bootloader on x86_64 and ppc64le
            bios:
              mpp-if: arch in ['x86_64', 'ppc64le']
              then:
                device: disk
                # ppc64le installs to the PReP partition, not the root of the disk
                partition:
                  mpp-if: arch == 'ppc64le'
                  then:
                    mpp-format-int: '{image.layout[''PowerPC-PReP-boot''].partnum}'
            static-configs: true
            deployment:
              default: true
          devices:
            disk:
              type: org.osbuild.loopback
              options:
                filename: disk.img
                partscan: true
          mounts:
            - name: root
              type: org.osbuild.xfs
              source: disk
              partition:
                mpp-format-int: '{image.layout[''root''].partnum}'
              target: /
            - name: boot
              type: org.osbuild.ext4
              source: disk
              partition:
                mpp-format-int: '{image.layout[''boot''].partnum}'
              target: /boot
            # Mount EFI partition on EFI architectures
            - mpp-if: arch in ['x86_64', 'aarch64', 'riscv64']
              then:
                name: efi
                type: org.osbuild.fat
                source: disk
                partition:
                  mpp-format-int: '{image.layout[''EFI-SYSTEM''].partnum}'
                target: /boot/efi
      - type: org.osbuild.chattr
        options:
          items:
            mount://root/:
              immutable: true
        devices:
          disk:
            type: org.osbuild.loopback
            options:
              filename: disk.img
              partscan: true
        mounts:
          - name: root
            type: org.osbuild.xfs
            source: disk
            partition:
              mpp-format-int: '{image.layout[''root''].partnum}'
            target: /
          - name: ostree.deployment
            type: org.osbuild.ostree.deployment
            options:
              source: mount
              deployment:
                default: true
  - name: raw-4k-image
    build:
      mpp-format-string: '{buildroot}'
    stages:
      - type: org.osbuild.truncate
        options:
          filename: disk.img
          size:
