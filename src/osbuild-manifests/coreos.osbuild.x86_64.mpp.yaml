            type: org.osbuild.loopback
            options:
              filename: disk.img
              sector-size:
                  mpp-format-int: "{four_k_sector_size}"
        options:
          mpp-format-json: '{image4k.layout}'
      # Create EFI filesystem on EFI architectures
      - mpp-if: arch in ['x86_64', 'aarch64', 'riscv64']
        then:
